# When clearState relaunches expo-dev-client, attach Metro and dismiss first-run
# developer-menu chrome. Metro must already be serving (`pnpm start`, :8081).
#
# Expo may list several :8081 rows (loopback + LAN, or other hosts on the network).
# Prefer 127.0.0.1 / localhost; if those rows are missing, deep-link loopback —
# do NOT tap a random first `:8081` (can load a stale/foreign Metro bundle).
#
# Do NOT tap a server *and* deep-link — double-attach races Fabric.
#
# A prior Maestro openLink can leave iOS "Open in Coach Watts?" over the launcher —
# Cancel that first or DEVELOPMENT SERVERS is not tappable.
appId: com.coachwatts.app
---
- runFlow:
    when:
      visible: Open
    commands:
      - tapOn: Cancel
      - waitForAnimationToEnd:
          timeout: 2000
- runFlow:
    when:
      visible: Open
    commands:
      - tapOn: Cancel
      - waitForAnimationToEnd:
          timeout: 2000
- extendedWaitUntil:
    visible: "DEVELOPMENT SERVERS"
    timeout: 45000
    optional: true
- runFlow:
    when:
      visible: "DEVELOPMENT SERVERS"
    commands:
      - tapOn:
          text: ".*127\\.0\\.0\\.1:8081.*"
          index: 0
          optional: true
      - runFlow:
          when:
            visible: "DEVELOPMENT SERVERS"
          commands:
            - tapOn:
                text: ".*localhost:8081.*"
                index: 0
                optional: true
      - runFlow:
          when:
            visible: "DEVELOPMENT SERVERS"
          commands:
            - openLink: exp+coach-watts-app://expo-development-client/?url=http%3A%2F%2F127.0.0.1%3A8081
            - extendedWaitUntil:
                visible: Open
                timeout: 8000
                optional: true
            - runFlow:
                when:
                  visible: Open
                commands:
                  - tapOn: Open
      - extendedWaitUntil:
          notVisible: "DEVELOPMENT SERVERS"
          timeout: 60000
- runFlow:
    when:
      visible: "In progress"
    commands:
      - openLink: exp+coach-watts-app://expo-development-client/?url=http%3A%2F%2F127.0.0.1%3A8081
      - extendedWaitUntil:
          visible: Open
          timeout: 8000
          optional: true
      - runFlow:
          when:
            visible: Open
          commands:
            - tapOn: Open
- extendedWaitUntil:
    notVisible: "In progress"
    timeout: 120000
    optional: true
- waitForAnimationToEnd:
    timeout: 5000
- extendedWaitUntil:
    visible: Continue
    timeout: 20000
    optional: true
- runFlow:
    when:
      visible: Continue
    commands:
      - tapOn: Continue
      - waitForAnimationToEnd:
          timeout: 5000
- runFlow:
    when:
      visible: "Open DevTools"
    commands:
      - tapOn: Close
      - waitForAnimationToEnd:
          timeout: 3000
# Full Dev Menu sheet (Reload / Go home) — header X is labeled Close.
- runFlow:
    when:
      visible: "Toggle performance monitor"
    commands:
      - tapOn: Close
      - waitForAnimationToEnd:
          timeout: 3000
