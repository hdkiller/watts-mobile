# Prefer deep link over tapOn: More — Today recommendation also has a "More" CTA
# that opens an action sheet and steals the tab label match.
appId: com.coachwatts.app
---
- openLink: coachwatts://more
- extendedWaitUntil:
    visible: Open
    timeout: 5000
    optional: true
- runFlow:
    when:
      visible: Open
    commands:
      - tapOn: Open
- extendedWaitUntil:
    visible:
      id: more-screen
    timeout: 20000
