# Deep link coachwatts://today — assumes authenticated session (start off Today).
appId: com.coachwatts.app
---
- runFlow: ../subflows/tap-tab-more.yaml
- openLink: coachwatts://today
- extendedWaitUntil:
    visible: Open
    timeout: 5000
    optional: true
- runFlow:
    when:
      visible: Open
    commands:
      - tapOn: Open
- extendedWaitUntil:
    visible:
      id: today-screen
    timeout: 20000
