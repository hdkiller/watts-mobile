# Deep link coachwatts://coach — assumes authenticated session.
appId: com.coachwatts.app
---
- openLink: coachwatts://coach
- extendedWaitUntil:
    visible: Open
    timeout: 5000
    optional: true
- runFlow:
    when:
      visible: Open
    commands:
      - tapOn: Open
- extendedWaitUntil:
    visible:
      id: coach-screen
    timeout: 20000
