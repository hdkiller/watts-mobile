# Cold start without e2e auth — expects Sign in chrome. Isolated wipe.
# Run with EXPO_PUBLIC_E2E_AUTH unset (normal .env / Metro). Metro must be running.
appId: com.coachwatts.app
tags:
  - smoke
  - isolated
---
- launchApp:
    clearState: true
    clearKeychain: true
- runFlow: subflows/connect-dev-client.yaml
- extendedWaitUntil:
    visible:
      id: login-screen
    timeout: 90000
- assertVisible:
    id: login-sign-in
- assertVisible: "Sign in"
