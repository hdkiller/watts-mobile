# Wellness check-in mutation — ISOLATED wipe + login (docs/e2e.md).
# Run `pnpm e2e:reset` in coach-wattz between mutation runs.
# Online save closes the sheet; offline queue briefly shows wellness-checkin-saved.
appId: com.coachwatts.app
tags:
  - isolated
  - mutation
---
- runFlow: subflows/boot-and-login.yaml
- openLink: coachwatts://log
- extendedWaitUntil:
    visible: Open
    timeout: 5000
    optional: true
- runFlow:
    when:
      visible: Open
    commands:
      - tapOn: Open
- extendedWaitUntil:
    visible:
      id: log-screen
    timeout: 15000
- runFlow: subflows/dismiss-dev-menu.yaml
- assertVisible:
    id: wellness-checkin
- tapOn:
    id: wellness-checkin
- runFlow:
    when:
      visible: "Toggle performance monitor"
    commands:
      - tapOn:
          id: xmark
      - waitForAnimationToEnd:
          timeout: 3000
      - tapOn:
          id: wellness-checkin
- extendedWaitUntil:
    visible:
      id: wellness-checkin-sheet
    timeout: 20000
- tapOn:
    text: "Mood 7"
- tapOn:
    id: wellness-checkin-save
- extendedWaitUntil:
    notVisible:
      id: wellness-checkin-sheet
    timeout: 20000
- assertVisible:
    id: log-screen
