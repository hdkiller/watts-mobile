# Authenticated shell smoke — requires e2e auth seed (see docs/e2e.md).
# iOS Simulator + local coach-wattz: EXPO_PUBLIC_E2E_INSTANCE_URL=http://localhost:3099
appId: com.coachwatts.app
---
- launchApp:
    clearState: true
- extendedWaitUntil:
    visible:
      id: today-screen
    timeout: 45000
- tapOn: Log
- extendedWaitUntil:
    visible:
      id: log-screen
    timeout: 15000
- tapOn: Coach
- extendedWaitUntil:
    visible:
      id: coach-screen
    timeout: 15000
- tapOn: More
- extendedWaitUntil:
    visible:
      id: more-screen
    timeout: 15000
- assertVisible: "More"
